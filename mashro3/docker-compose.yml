version: '3.8'

services:

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: carcarex_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carcarex
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Node.js Backend
  backend:
    build: ./server
    container_name: carcarex_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: carcarex
      DB_PORT: 3306
      JWT_SECRET: carcareX_super_secret_key_change_this_later
      PORT: 5000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CHATBOT_URL: ${CHATBOT_URL:-http://chatbot:8000}
    depends_on:
      db:
        condition: service_healthy

  # Python Chatbot
  chatbot:
    build: ../Project
    container_name: carcarex_chatbot
    restart: always
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}

  # React Frontend
  frontend:
    build: .
    container_name: carcarex_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
      - chatbot

volumes:
  db_data: